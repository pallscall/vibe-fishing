<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI AGENT 进化实验室</title>
    <style>
        :root {
            --primary-color: #ff00ff;
            --secondary-color: #00ffff;
            --bg-color: #0a0416;
            --text-color: #ffffff;
            --font-display: 'Press Start 2P', cursive;
            --font-body: 'Courier Prime', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-body);
        }

        body {
            background: var(--bg-color) url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAIAAACRXR/mAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAIGNIUk0AAHolAACAgwAA+f8AAIDpAAB1MAAA6mAAADqYAAAXb5JfxUYAAABnSURBVHja7M5RDYAwDEXRDgmvEocnlrQS2SwUFST9uEfBGWs9c97nbGtDcquqiKhOImLs/UpuzVzWEi1atGjRokWLFi1atGjRokWLFi1atGjRokWLFi1atGjRokWLFi1atGjRokWLFi1atGjRokWLFi1atGjRoXvUoDvwAAAABJRU5ErkJggg==') repeat;
            color: var(--text-color);
            overflow-x: hidden;
        }

        .neon-text {
            font-family: var(--font-display);
            text-shadow: 0 0 5px var(--primary-color), 0 0 20px var(--primary-color), 0 0 40px var(--primary-color);
            animation: neon-pulse 2s infinite;
        }

        @keyframes neon-pulse {
            0%, 100% { text-shadow: 0 0 5px var(--primary-color), 0 0 20px var(--primary-color), 0 0 40px var(--primary-color); }
            50% { text-shadow: 0 0 10px var(--primary-color), 0 0 30px var(--primary-color), 0 0 60px var(--primary-color); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .section {
            background: rgba(10, 4, 22, 0.95);
            border: 2px solid var(--secondary-color);
            border-radius: 15px;
            padding: 2rem;
            margin: 3rem 0;
            transform: skewX(-2deg);
            transition: transform 0.3s ease;
        }

        .section:hover {
            transform: skewX(0deg) scale(1.02);
        }

        .card {
            background: #1a0f3a;
            padding: 1.5rem;
            border-radius: 10px;
            margin: 1rem 0;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }

        .vibe-signature {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            font-size: 0.7rem;
            opacity: 0.3;
            transition: opacity 0.3s ease;
            cursor: pointer;
        }

        .vibe-signature:hover {
            opacity: 1;
            text-shadow: 0 0 5px var(--secondary-color);
        }

        @media (max-width: 768px) {
            .neon-text {
                font-size: 1.5rem;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Courier+Prime&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="neon-text">AI AGENT 进化实验室</h1>
        <p style="text-align: center; margin: 1rem 0; color: var(--secondary-color)">重新定义工作方式的智能协作伙伴</p>

        <div class="section">
            <h2 style="color: var(--primary-color); margin-bottom: 1rem">核心能力矩阵</h2>
            <div class="card">
                <h3>自动化任务流</h3>
                <p>✅ 跨平台数据同步 ✅ 智能规则引擎 ✅ 无人值守执行</p>
            </div>
            <div class="card">
                <h3>多模态交互</h3>
                <p>🎨 图像理解 🎤 语音交互 📝 自然语言处理</p>
            </div>
            <div class="card">
                <h3>自主进化系统</h3>
                <p>📈 行为分析 🧠 策略优化 📊 效果反馈闭环</p>
            </div>
        </div>

        <div class="section">
            <h2 style="color: var(--primary-color); margin-bottom: 1rem">真实场景案例</h2>
            <div class="card">
                <p>💡 跨境电商: 24h智能客服系统实现转化率+30%</p>
            </div>
            <div class="card">
                <p>💡 内容创作: 自动化脚本生成提升产能200%</p>
            </div>
            <div class="card">
                <p>💡 数据分析: 实时市场洞察缩短决策周期70%</p>
            </div>
        </div>
    </div>

    <div class="vibe-signature">
        Created By VibeFishing
        <br>
        <small>AI驱动的创意实验室</small>
    </div>

    <script>
        // 页面加载动画
        document.querySelectorAll('.section').forEach((el, i) => {
            el.style.opacity = '0';
            el.style.transform = 'translateX(-100px) skewX(-2deg)';
            setTimeout(() => {
                el.style.transition = 'all 0.6s ease';
                el.style.opacity = '1';
                el.style.transform = 'translateX(0) skewX(-2deg)';
            }, i * 200);
        });
    </script>
</body>
</html>
