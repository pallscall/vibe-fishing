services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      SKILLS_PATH: /skills
    volumes:
      - ../backend/config.yaml:/app/config.yaml:ro
      - ../backend/mcp_config.json:/app/mcp_config.json
      - ../backend/storage:/app/storage
      - ../skills:/skills:ro

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
